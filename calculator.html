<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaCalc - Dynamic Calculator</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        animation: gradientBG 12s ease infinite;
        background: linear-gradient(-45deg, #1e1e2f, #2c2c54, #1f4068, #162447);
        background-size: 400% 400%;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .calculator {
        background: #111;
        padding: 25px;
        border-radius: 25px;
        box-shadow: 0 0 40px rgba(0,0,0,0.7);
        width: 320px;
    }

    #display {
        width: 100%;
        height: 70px;
        font-size: 32px;
        text-align: right;
        padding: 10px;
        border-radius: 15px;
        border: none;
        outline: none;
        background: #000;
        color: white;
        margin-bottom: 5px;
    }

    #preview {
        text-align: right;
        color: #888;
        font-size: 18px;
        margin-bottom: 15px;
        min-height: 20px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
    }

    button {
        height: 70px;
        border-radius: 50%;
        border: none;
        font-size: 22px;
        cursor: pointer;
        background: #2b2b2b;
        color: white;
        transition: 0.2s;
        box-shadow: inset 0 0 10px rgba(255,255,255,0.05),
                    0 5px 15px rgba(0,0,0,0.6);
    }

    button:hover {
        transform: scale(1.08);
    }

    button:active {
        transform: scale(0.95);
    }

    .operator {
        background: #3a3a3a;
    }

    .equal {
        background: linear-gradient(145deg, #ff9a3c, #ff6a00);
        color: white;
    }

    .zero {
        grid-column: span 2;
        border-radius: 40px;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>
    <div id="preview"></div>

    <div class="buttons">

        <!-- Row 1 -->
        <button onclick="clearDisplay()" class="operator">AC</button>
        <button onclick="deleteSingle()" class="operator">⌫</button>
        <button onclick="appendValue('%')" class="operator">%</button>
        <button onclick="appendValue('/')" class="operator">÷</button>

        <!-- Row 2 -->
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')" class="operator">×</button>

        <!-- Row 3 -->
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')" class="operator">−</button>

        <!-- Row 4 -->
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')" class="operator">+</button>

        <!-- Row 5 -->
        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>

    </div>
</div>

<script>
    const display = document.getElementById("display");
    const preview = document.getElementById("preview");

    function appendValue(value) {
        display.value += value;
        showPreview();
    }

    function clearDisplay() {
        display.value = "";
        preview.innerText = "";
    }

    function deleteSingle() {
        display.value = display.value.slice(0, -1);
        showPreview();
    }

    function calculate() {
        try {
            display.value = eval(display.value);
            preview.innerText = "";
        } catch {
            display.value = "Error";
            preview.innerText = "";
        }
    }

    function showPreview() {
        try {
            if (display.value !== "") {
                preview.innerText = "= " + eval(display.value);
            }
        } catch {
            preview.innerText = "";
        }
    }

    // Keyboard Support
    document.addEventListener("keydown", function(event) {
        const key = event.key;

        if (!isNaN(key) || "+-*/.%".includes(key)) {
            appendValue(key);
        }
        else if (key === "Enter") {
            calculate();
        }
        else if (key === "Backspace") {
            deleteSingle();
        }
        else if (key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
